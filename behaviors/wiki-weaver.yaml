bundle:
  name: wiki-weaver-behavior
  version: 0.1.0
  description: >
    Mounts the wiki-weaver tools (wiki_weaver_init, wiki_weaver_ingest,
    wiki_weaver_ask, wiki_weaver_lint) and a thin orientation context.
    Compose onto any bundle to add LLM-wiki automation tools.

# source: is relative to THIS FILE's directory (behaviors/).
# ../modules/tool-wiki-weaver resolves to <repo-root>/modules/tool-wiki-weaver.
# Post-publish form (documented, not active):
#   source: git+https://github.com/microsoft/amplifier-app-wiki-weaver@main#subdirectory=modules/tool-wiki-weaver
tools:
  - module: tool-wiki-weaver
    source: ../modules/tool-wiki-weaver

# NO @ prefix in YAML context.include — bare bundle:path form.
# wiki-weaver: refers to the ROOT bundle's namespace (registered by bundle.md).
# When composed via the root bundle, this resolves to
# <repo-root>/context/wiki-weaver-awareness.md.
context:
  include:
    - wiki-weaver:context/wiki-weaver-awareness.md
