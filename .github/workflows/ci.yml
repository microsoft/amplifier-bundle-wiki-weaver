name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Lightweight, hermetic CI. wiki-weaver declares amplifier-foundation +
        # amplifier-unified-llm-client as @main git deps; we install with --no-deps so CI
        # does NOT git-clone those two repos on every run (slow + network-flaky). The real
        # `uv tool install` + @main resolution is validated by the DTU install proof, not CI.
        # Deterministic tests run here; tests needing the Amplifier runtime self-skip when
        # amplifier_foundation is absent.
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
          pip install --no-deps -e .

      - name: Run eval tests
        # The deterministic tests (policy, provenance, ingest-drain, any-text ingest)
        # run without LLM calls or API keys and should always pass. Tests that invoke
        # the LLM pipeline (via amplifier_foundation) are automatically skipped when
        # that package is not installed — CI runs the deterministic majority.
        run: python -m pytest eval/ -q
